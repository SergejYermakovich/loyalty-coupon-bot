<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Loyalty Coupon Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>🎟️ Loyalty Bot</h1>
      <p class="subtitle">Панель бизнеса</p>
    </header>

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-value" id="totalCustomers">0</div>
        <div class="stat-label">Клиентов</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎫</div>
        <div class="stat-value" id="activeCoupons">0</div>
        <div class="stat-label">Активных купонов</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎁</div>
        <div class="stat-value" id="rewardsClaimed">0</div>
        <div class="stat-label">Наград выдано</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="actions">
      <h2>Быстрые действия</h2>
      <div class="action-buttons">
        <a href="scan.html" class="action-btn primary">
          <span class="btn-icon">📷</span>
          <span>Сканер QR</span>
        </a>
        <a href="coupons.html" class="action-btn">
          <span class="btn-icon">🎫</span>
          <span>Купоны</span>
        </a>
        <a href="stats.html" class="action-btn">
          <span class="btn-icon">📊</span>
          <span>Статистика</span>
        </a>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="activity">
      <h2>Последняя активность</h2>
      <div id="recentActivity" class="activity-list">
        <div class="loading">Загрузка...</div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
