spring:
  application:
    name: loyalty-coupon-bot
  
  profiles:
    active: dev
  
  datasource:
    url: jdbc:postgresql://localhost:5432/loyaltybot
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:your-bot-token-here}
    username: ${TELEGRAM_BOT_USERNAME:LoyaltyCouponBot}
    # Mini App URL (будет обновлено после деплоя)
    mini-app-url: ${TELEGRAM_MINI_APP_URL:https://your-domain.com/app}

server:
  port: 8080

logging:
  level:
    com.loyaltybot: DEBUG
    org.telegram: INFO
    org.springframework.web: INFO

# Actuator for Docker health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
